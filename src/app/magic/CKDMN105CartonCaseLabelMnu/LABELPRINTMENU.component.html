
<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.LABELPRINTMENU">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getValue(mgc.Edit2) }}
                        </label></h3>

                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row">
                    <div class="col-lg-2">
                    </div>
                    <div class="col-lg-8 text-center">
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_1_Carton_Label_Print_v)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_1_Carton_Label_Print_v">
                                {{mg.getValue(mgc.btn_1_Carton_Label_Print_v)}}
                            </button>
                        </div>
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_2_Case_Label_Print_v)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_2_Case_Label_Print_v">
                                {{mg.getValue(mgc.btn_2_Case_Label_Print_v)}}
                            </button>
                        </div>
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_3_Case_Part__Engine_List_v)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_3_Case_Part__Engine_List_v">
                                {{mg.getValue(mgc.btn_3_Case_Part__Engine_List_v)}}
                            </button>
                        </div>
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_4_Carton_Label_Print_A4_v)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_4_Carton_Label_Print_A4_v">
                                {{mg.getValue(mgc.btn_4_Carton_Label_Print_A4_v)}}
                            </button>
                        </div>
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_5_Container_Label_Print_v)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_5_Container_Label_Print_v">
                                {{mg.getValue(mgc.btn_5_Container_Label_Print_v)}}
                            </button>
                        </div>
                        <div class="form-group" *ngIf="mg.getVisible(mgc.btn_6_Case_Label_Print_v_0001)==='visible'">
                            <button class="btn btn-primary font-weight-bold mb-3 btn-wdth-75"
                                [magic]="mgc.btn_6_Case_Label_Print_v_0001">
                                {{mg.getValue(mgc.btn_6_Case_Label_Print_v_0001)}}
                            </button>
                        </div>
                    </div>
                    <div class="col-lg-2">

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
