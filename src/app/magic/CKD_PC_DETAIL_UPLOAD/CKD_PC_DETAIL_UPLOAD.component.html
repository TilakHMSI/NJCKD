<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.CKD_PC_DETAIL_UPLOAD">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                           CKD PC DETAIL UPLOAD
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            
        <input style="display:none" [formControlName]="mgc.vBlob64base" [magic]="mgc.vBlob64base" mgFormat />
            <div class="card-body">
                <div class="col-lg-12" >
                <div class="form-group row">
                    <label class="col-lg-2 col-sm-12 col-form-label mt-2">File Name</label>
                    <div class="col-lg-5 col-sm-12 form-group">
                        <input class="form-control" type="text" [formControlName]="mgc.v_FileName" [magic]="mgc.v_FileName" placeholder="Select file to upload" mgFormat />
                        <mgError [magic]="mgc.v_FileName"> </mgError>
                    </div>
                    <div class="col-lg-4 col-sm-12 form-group">
                        <button class="btn btn-sm btn-warning mr-5" magic="Attachment">
                            <label style="margin-bottom: 0;">
                                Browse
                                <input type="file" style="display:none" accept=".xlsx" (change)="fileUpload($event)" />
                            </label>
                        </button>
                        <button class="btn btn-sm btn-success mr-2" *ngIf="mg.getVisible(mgc.btnUpload)==='visible'"
                         [magic]="mgc.btnUpload" >
                            <i class="flaticon2-arrow-up"></i>Upload
                        </button>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>
</div>
