<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.CKDM0030PackingMatMaster">
        <div
            class="container-fluid d-flex align-items-center justify-content-sm-between justify-content-center flex-wrap flex-sm-nowrap">
            <div class="d-flex align-items-center flex-wrap mr-1">
                <div class="d-flex align-items-center ser-bt1">
                    <div></div><button type="button" class="btn btn-sm btn-success ml-5" [magic]="mgc.btnAdd"
                        *ngIf="mg.getVisible(mgc.btnAdd)==='visible'">
                        <i class="flaticon-app mr-2"></i>Add
                    </button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12 col-xxl-12">
                    <div class="form-group row">
                        <div class="col-lg-6">
                            <div class="example-container mat-elevation-z8 Table23TableContainerProps">
                                <mat-table #table [dataSource]="dataSource" class="container_border" matSort
                                    matSortDisableClear (matSortChange)="tableService.sortData($event)">
                                    <ng-container [magic]="mgc.Column24" [matColumnDef]="mgc.Column24">
                                        <mat-header-cell *matHeaderCellDef>
                                            CODE
                                        </mat-header-cell>
                                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                                            <div style="display: flex; flex-direction: row"
                                                *ngIf="mg.ifRowCreated(row)">
                                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                                    <div>
                                                        <input [formControlName]="mgc.CODE"
                                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.CODE"
                                                            [rowId]="row.rowId" mgFormat />
                                                        <mgError [magic]=mgc.CODE [rowId]="row.rowId"> </mgError>
                                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.CODE"
                                                            [rowId]="row.rowId">
                                                            {{mg.getValue(mgc.CODE, row.rowId)
                                                            }}
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        </mat-cell>
                                    </ng-container>
                                    <ng-container [magic]="mgc.Column25" [matColumnDef]="mgc.Column25">
                                        <mat-header-cell *matHeaderCellDef>
                                            DESC
                                        </mat-header-cell>
                                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                                            <div style="display: flex; flex-direction: row"
                                                *ngIf="mg.ifRowCreated(row)">
                                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                                    <div>
                                                        <input [formControlName]="mgc.DESC"
                                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.DESC"
                                                            [rowId]="row.rowId" mgFormat />
                                                        <mgError [magic]=mgc.DESC [rowId]="row.rowId"> </mgError>
                                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.DESC"
                                                            [rowId]="row.rowId">
                                                            {{mg.getValue(mgc.DESC, row.rowId)
                                                            }}
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        </mat-cell>
                                    </ng-container>
                                    <ng-container [magic]="mgc.Column32" [matColumnDef]="mgc.Column32">
                                        <mat-header-cell *matHeaderCellDef>
                                            Action
                                        </mat-header-cell>
                                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                                            <div style="display: flex; flex-direction: row"
                                                *ngIf="mg.ifRowCreated(row)">
                                                <button class="btn-tbl" [magic]="mgc.btnEdit" [rowId]="row.rowId"
                                                    [style.visibility]="mg.getVisible(mgc.btnEdit, row.rowId)">
                                                    <i class="icon-xl far fa-edit text-info" aria-hidden="true"></i>
                                                </button>
                                                <button class="btn-tbl" [magic]="mgc.btnDelete" [rowId]="row.rowId">
                                                    <i class="icon-xl fas fa-trash text-danger" aria-hidden="true"></i>
                                                </button>
                                            </div>
                                        </mat-cell>
                                    </ng-container>
                                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                                        (click)="row? tableService.selectRow(row.rowId) : null">
                                    </mat-row>
                                </mat-table>
                                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                                    (page)="tableService.mgOnPaginateChange($event)">
                                </mat-paginator>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="col-lg-12 col-xxl-12">
                                <div class="form-group row">
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> PACKING TYPE:</label>
                                            <input class="form-control-ed"
                                                [formControlName]="mgc.PK_TYPE_MAST_PK_TYP_CD"
                                                [magic]="mgc.PK_TYPE_MAST_PK_TYP_CD" mgFormat />
                                            <mgError [magic]=mgc.PK_TYPE_MAST_PK_TYP_CD> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label>.</label>
                                            <input class="form-control-ed"
                                                [formControlName]="mgc.PK_TYPE_MAST_PK_TYPE_DESC"
                                                [magic]="mgc.PK_TYPE_MAST_PK_TYPE_DESC" mgFormat />
                                            <mgError [magic]=mgc.PK_TYPE_MAST_PK_TYPE_DESC> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> LENGTH (In MM)</label>
                                            <input class="form-control-ed" [formControlName]="mgc.LENG" type='number'
                                                [magic]="mgc.LENG" mgFormat />
                                            <mgError [magic]=mgc.LENG> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> HEIGHT (In MM)</label>
                                            <input class="form-control-ed" [formControlName]="mgc.HEIG" type='number'
                                                [magic]="mgc.HEIG" mgFormat />
                                            <mgError [magic]=mgc.HEIG> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> WIDTH (In MM)</label>
                                            <input class="form-control-ed" [formControlName]="mgc.WIDT" type='number'
                                                [magic]="mgc.WIDT" mgFormat />
                                            <mgError [magic]=mgc.WIDT> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> WEIGHT (In GM)</label>
                                            <input class="form-control-ed" [formControlName]="mgc.WEIG" type='number'
                                                [magic]="mgc.WEIG" mgFormat />
                                            <mgError [magic]=mgc.WEIG> </mgError>
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label>EFFECTIVE DATE:</label>
                                            <input class="form-control-ed" type="date" [formControlName]="mgc.EF_DT"
                                                [magic]="mgc.EF_DT" dateInput />
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label>END DATE:</label>
                                            <input class="form-control-ed" type="date" [formControlName]="mgc.ED_DT"
                                                [magic]="mgc.ED_DT" dateInput />
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group-sm">
                                            <label> VARIENCE</label>
                                            <input class="form-control-ed" [formControlName]="mgc.VARNC" type='number'
                                                [magic]="mgc.VARNC" mgFormat />
                                            <mgError [magic]=mgc.VARNC> </mgError>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
