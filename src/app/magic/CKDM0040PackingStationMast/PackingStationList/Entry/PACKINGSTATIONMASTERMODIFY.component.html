<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.PACKINGSTATIONMASTERMODIFY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            PACKING STATION MASTER : MODIFY
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-2">
                                
                            </div>
                            <div class="col-lg-8">
                                <div class="form-group-sm">
                                    <label> PACKING STATION </label>
                                    <input [formControlName]="mgc.PST_STAT" [magic]="mgc.PST_STAT"
                                        class="form-control-ed" mgFormat />
                                    <mgError [magic]="mgc.PST_STAT"> </mgError>
                                </div>
                            </div>
                               <label [magic]="mgc.Label12" class="text-danger mb-5"  >
                        {{mg.getText(mgc.Label12)}}
                    </label>
                            <div class="col-lg-2">
                                
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.btnSave"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>
                             <div class="col-lg-4">
                                <div class="form-group-sm">
                                </div>
                            </div>
                    </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
