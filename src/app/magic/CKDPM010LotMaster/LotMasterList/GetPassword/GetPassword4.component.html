<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.GetPassword4">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lbl-sm" class="lable_overflow mb-0">
                            Password
                        </label></h3>
                    <button type="button" [magic]="mgc.v_Cancel"
                        class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="form-group row" style="margin: 0rem;">
                <div class="col-lg-12">
                    <div class="form-group row">
                        <div class="col-lg-12">
                            <div class="form-group">
                                <label>Enter Password: </label>
                                <input class="form-control" [formControlName]="mgc.v_Get_pass" [magic]="mgc.v_Get_pass"
                                    [attr.required]="" type="password" mgFormat />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12 col-xxl-12">
                <div class="form-group row">
                    <div class="col-lg-6 text-center">
                        <div class="form-group d-flex justify-content-center">
                            <button type="button" [magic]="mgc.v_Ok" [disabled]="mg.isDisabled(mgc.v_Ok )"
                                class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                Ok
                            </button>
                        </div>
                    </div>
                    <div class="col-lg-6 text-center">
                        <div class="form-group d-flex justify-content-center">
                            <button type="button" [magic]="mgc.v_Cancel"
                                class="btn btn-secondary font-weight-bold mr-3 btn-wdth">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
