<div
    novalidate
    [formGroup]="screenFormGroup"
>
    <div
        style="display: flex; flex-direction: column"
        [magic]="mgc.FrameINQUIRY"
    >
        <div style="display: flex; flex-direction: row">
            <div *ngIf="mg.isImageExists(mgc.Image1)">
                <img
                    [magic]="mgc.Image1"
                    [src]="mg.getImage(mgc.Image1)"
                />
            </div>
            <label [magic]="mgc.Edit1">
                {{mg.getValue(mgc.Edit1) }}
            </label>
            <label [magic]="mgc.Edit2">
                {{mg.getValue(mgc.Edit2)
| magicDate : mgc.Edit2}}
            </label>
            <label [magic]="mgc.Edit3">
                {{mg.getValue(mgc.Edit3)
| magicTime : mgc.Edit3}}
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label [magic]="mgc.Edit4">
                {{mg.getValue(mgc.Edit4) }}
            </label>
            <button [magic]="mgc.btnexit">
                Back
            </button>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label6"
                class="lable_overflow"
            >
            </label>
            <label
                [magic]="mgc.Label8"
                class="lable_overflow"
            >
                P/C No.
            </label>
            <div>
                <input
                    style="width: 70%"
                    [formControlName]="mgc.PC_No_v"
                    [magic]="mgc.PC_No_v"
                    [mask]="mg.getAlphaMask(mgc.PC_No_v)"
                    [showMaskTyped]='true'
                />
                <mgError [magic]=mgc.PC_No_v> </mgError>
                <button
                    style="min-width: auto; margin: auto"
                    [magic]="mgc.PC_No_v"
                >...</button>
            </div>
            <label
                [magic]="mgc.Label10"
                class="lable_overflow"
            >
                Lot No.
            </label>
            <div>
                <input
                    style="width: 70%"
                    [formControlName]="mgc.Lot_No_v"
                    currencyMask
                    [options]="mg.getNumericPicture(mg.getPicture(mgc.Lot_No_v))"
                    [magic]="mgc.Lot_No_v"
                    mgFormat
                />
                <mgError [magic]=mgc.Lot_No_v> </mgError>
                <button
                    style="min-width: auto; margin: auto"
                    [magic]="mgc.Lot_No_v"
                >...</button>
            </div>
            <label
                [magic]="mgc.Label12"
                class="lable_overflow"
            >
                Frame No.
            </label>
            <div>
                <input
                    [formControlName]="mgc.Engine1_v"
                    [magic]="mgc.Engine1_v"
                    mgFormat
                />
                <mgError [magic]=mgc.Engine1_v> </mgError>
            </div>
            <label
                [magic]="mgc.Label14"
                class="lable_overflow"
            >
                -
            </label>
            <div>
                <input
                    [formControlName]="mgc.Engine2_v"
                    type='number'
                    [magic]="mgc.Engine2_v"
                    mgFormat
                />
                <mgError [magic]=mgc.Engine2_v> </mgError>
            </div>
            <label
                [magic]="mgc.Label7"
                class="lable_overflow"
            >
            </label>
            <div
                [magic]="mgc.Display_Type_v"
                (change)="task.mgOnRadioSelectionChanged(mgc.Display_Type_v)"
            >
                <div *ngFor="let o of mg.getItemListValues(mgc.Display_Type_v);">
                    <label>
                        <input
                            type="radio"
                            [formControlName]="mgc.Display_Type_v"
                            [value]="o.index"
                        />
                        {{o.displayValue}}
                    </label>
                </div>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label16"
                [style.visibility]="mg.getVisible(mgc.Label16)"
                class="lable_overflow"
            >
                Dist
            </label>
            <div>
                <input
                    [formControlName]="mgc.KDPCHED_PH_DSCD"
                    [magic]="mgc.KDPCHED_PH_DSCD"
                    mgFormat
                />
                <mgError [magic]=mgc.KDPCHED_PH_DSCD> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.DSTBMST_DS_DSENAM"
                    [magic]="mgc.DSTBMST_DS_DSENAM"
                    mgFormat
                />
                <mgError [magic]=mgc.DSTBMST_DS_DSENAM> </mgError>
            </div>
            <label
                [magic]="mgc.Label19"
                [style.visibility]="mg.getVisible(mgc.Label19)"
                class="lable_overflow"
            >
                Model
            </label>
            <div>
                <input
                    [formControlName]="mgc.PKD_LTID_PKD_MDCD"
                    [magic]="mgc.PKD_LTID_PKD_MDCD"
                    mgFormat
                />
                <mgError [magic]=mgc.PKD_LTID_PKD_MDCD> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.MTOCMST_MTMDN1"
                    [magic]="mgc.MTOCMST_MTMDN1"
                    mgFormat
                />
                <mgError [magic]=mgc.MTOCMST_MTMDN1> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.PKD_LTID_PKD_MDTY"
                    [magic]="mgc.PKD_LTID_PKD_MDTY"
                    mgFormat
                />
                <mgError [magic]=mgc.PKD_LTID_PKD_MDTY> </mgError>
            </div>
            <div>
                <input
                    [formControlName]="mgc.PKD_LTID_PKD_MDOP"
                    [magic]="mgc.PKD_LTID_PKD_MDOP"
                    mgFormat
                />
                <mgError [magic]=mgc.PKD_LTID_PKD_MDOP> </mgError>
            </div>
        </div>
        <div style="display: flex; flex-direction: row">
            <magic-subform [magic]="mgc.Frame_Data">
            </magic-subform>
        </div>
    </div>
</div>
