<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.FrameINQUIRY">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getValue(mgc.Edit2) }}
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-2">
                                <div class="form-group">
                                    <label>PC NO</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.PC_No_v" [magic]="mgc.PC_No_v"
                                            class="form-control" placeholder="SELECT PC No" mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.PC_No_v">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group">
                                    <label>LOT CODE</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.Lot_No_v" [magic]="mgc.Lot_No_v"
                                            class="form-control" placeholder="SELECT PC LOT CODE" mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.Lot_No_v">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>Frame No</label>
                                    <input class="form-control" [formControlName]="mgc.Engine1_v"
                                        [magic]="mgc.Engine1_v" mgFormat />
                                    <mgError [magic]=mgc.Engine1_v> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>-</label>
                                    <input class="form-control" [formControlName]="mgc.Engine2_v"
                                        [magic]="mgc.Engine2_v" mgFormat />
                                    <mgError [magic]=mgc.Engine2_v> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm mt-5">
                                    <!-- <label>-</label> -->
                                    <div [magic]="mgc.Display_Type_v"
                                        (change)="task.mgOnRadioSelectionChanged(mgc.Display_Type_v)">
                                        <div *ngFor="let o of mg.getItemListValues(mgc.Display_Type_v);">
                                            <label>
                                                <input type="radio" [formControlName]="mgc.Display_Type_v"
                                                    [value]="o.index" />
                                                {{o.displayValue}}
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.btnView"
                                        class="btn btn-primary font-weight-bold mt-8 btn-wdth">
                                        View
                                    </button>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>Dist</label>
                                    <input class="form-control" [formControlName]="mgc.KDPCHED_PH_DSCD"
                                        [magic]="mgc.KDPCHED_PH_DSCD" mgFormat />
                                    <mgError [magic]=mgc.KDPCHED_PH_DSCD> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>.</label>
                                    <input class="form-control" [formControlName]="mgc.DSTBMST_DS_DSENAM"
                                        [magic]="mgc.DSTBMST_DS_DSENAM" mgFormat />
                                    <mgError [magic]=mgc.DSTBMST_DS_DSENAM> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>MODEL</label>
                                    <input class="form-control" [formControlName]="mgc.PKD_LTID_PKD_MDCD"
                                        [magic]="mgc.PKD_LTID_PKD_MDCD" mgFormat />
                                    <mgError [magic]=mgc.PKD_LTID_PKD_MDCD> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>.</label>
                                    <input class="form-control" [formControlName]="mgc.MTOCMST_MTMDN1"
                                        [magic]="mgc.MTOCMST_MTMDN1" mgFormat />
                                    <mgError [magic]=mgc.MTOCMST_MTMDN1> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>.</label>
                                    <input class="form-control" [formControlName]="mgc.PKD_LTID_PKD_MDTY"
                                        [magic]="mgc.PKD_LTID_PKD_MDTY" mgFormat />
                                    <mgError [magic]=mgc.PKD_LTID_PKD_MDTY> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-2">
                                <div class="form-group-sm">
                                    <label>.</label>
                                    <input class="form-control" [formControlName]="mgc.PKD_LTID_PKD_MDOP"
                                        [magic]="mgc.PKD_LTID_PKD_MDOP" mgFormat />
                                    <mgError [magic]=mgc.PKD_LTID_PKD_MDOP> </mgError>
                                </div>
                            </div>
                        </div>
                        <div class="form-group row">
                            <div class="col-lg-12">
                                <magic-subform [magic]="mgc.FrameData">
                                </magic-subform>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
