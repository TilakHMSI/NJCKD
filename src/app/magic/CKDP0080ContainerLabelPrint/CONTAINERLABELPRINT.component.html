
<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.CONTAINERLABELPRINT">
        <div class="card">
            <div class="card-header">
                         <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit2)}}
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit5)}}
                        </label>
                        <label [magic]="mgc.Edit3" class="mb-0 mr-3">
                            {{mg.getValue(mgc.Edit3)
                            | magicDate : mgc.Edit3}}
                        </label>
                        <label [magic]="mgc.Edit4" class="mb-0 mr-1">
                            {{mg.getValue(mgc.Edit4)
                            | magicTime : mgc.Edit4}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        <div class="form-group row">
                           
							   <div class="col-lg-6">
                                <div class="form-group-sm">
                                   
                                    <label >Date</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Date_v"
                            [magic]="mgc.Date_v" dateInput />
                                  
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="form-group">
                                    <label>PC No</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.PC_No_v" [magic]="mgc.PC_No_v"
                                            [mask]="mg.getAlphaMask(mgc.PC_No_v)" [showMaskTyped]='true'
                                            class="form-control" placeholder="SELECT PC NO" mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.PC_No_v">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
							 <div class="col-lg-6">
                                <div class="form-group-sm">         
                                <label>Dist </label>
                                <input type="text" [formControlName]="mgc.KDPCHED_PH_DSCD" [magic]="mgc.KDPCHED_PH_DSCD"
                                    class="form-control" mgFormat />
                                </div>
                            </div>
                            
							 <div class="col-lg-6">
                                <div class="form-group-sm">             
                                <label> </label>
                                <input type="text" [formControlName]="mgc.DSTBMST_DS_DSENAM" [magic]="mgc.DSTBMST_DS_DSENAM"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
							
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="col-lg-12">
            <magic-subform [magic]="mgc.Datewise_Carton_Inquiry">
            </magic-subform>
        </div>
    </div>
</div>
