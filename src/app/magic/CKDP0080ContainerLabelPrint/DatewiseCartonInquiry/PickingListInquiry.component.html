

<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.PickingListInquiry">
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table2TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                            
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                  
                                        <input [formControlName]="mgc.WRK_PKPL_SLFL" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.WRK_PKPL_SLFL" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.WRK_PKPL_SLFL [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKPL_SLFL"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.WRK_PKPL_SLFL, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            Pc No
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.WRK_PKPL_WRK_PKPL_PCNO"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKPL_WRK_PKPL_PCNO"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.WRK_PKPL_WRK_PKPL_PCNO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKPL_WRK_PKPL_PCNO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.WRK_PKPL_WRK_PKPL_PCNO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                            Lot No
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.WRK_PKPL_WRK_PKPL_LTNO"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKPL_WRK_PKPL_LTNO"
                                            [magic]="mgc.WRK_PKPL_WRK_PKPL_LTNO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.WRK_PKPL_WRK_PKPL_LTNO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKPL_WRK_PKPL_LTNO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.WRK_PKPL_WRK_PKPL_LTNO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                            Model
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PKD_LTID_PKD_MDCD"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PKD_LTID_PKD_MDCD"
                                            [magic]="mgc.PKD_LTID_PKD_MDCD" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PKD_LTID_PKD_MDCD [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PKD_LTID_PKD_MDCD"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PKD_LTID_PKD_MDCD, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>


                   <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10"  [hidePageSize]="true" showFirstLastButtons
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>>
                            <button type="button" [magic]="mgc.All_Select_v1"
                            class="btn btn-primary btn-sm font-weight-bold ml-2">All Select</button>
                            <button type="button" [magic]="mgc.All_Unselect_v1"
                            class="btn btn-primary btn-sm font-weight-bold ml-2">All Unselect</button>
                            <button type="button" [magic]="mgc.Print_v1"
                            class="btn btn-primary btn-sm font-weight-bold ml-2">Print</button>
                              <button type="button" [magic]="mgc.Help"
                            class="btn btn-primary btn-sm font-weight-bold ml-2">Help </button>
                             <button type="button" [magic]="mgc.Exit_v1"
                            class="btn btn-primary btn-sm font-weight-bold ml-2">Exit</button>
    </div>
</div>
