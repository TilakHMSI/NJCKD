<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.DateEngineDetails">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                           {{mg.getValue(mgc.Edit2) }}
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label>Date From</label>
                                    <input class="form-control-ed" type="date" [formControlName]="mgc.F_Date" [magic]="mgc.F_Date" dateInput />
                                    <mgError [magic]=mgc.F_Date> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-6">
                               <div class="form-group-sm">
                                    <label>Date To</label>
                                    <input class="form-control-ed" type="date" [formControlName]="mgc.T_Date" [magic]="mgc.T_Date" dateInput />
                                    <mgError [magic]=mgc.T_Date> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-12">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.btnView"
                                        class="btn btn-primary font-weight-bold mt-8 btn-wdth">
                                        View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
