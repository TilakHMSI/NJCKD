
<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.PACKING_TYPE_MASTER_CM">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            PACKING TYPE MASTER MAINTENANCE
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-3"></div>
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label>CODE :</label>
                                    <input [formControlName]="mgc.PK_TYP_CD" [magic]="mgc.PK_TYP_CD"
                                        class="form-control-ed" mgFormat />
                                    <mgError [magic]="mgc.PK_TYP_CD"> </mgError>
                                </div>
                            </div>
                           <div class="col-lg-3"></div>
                        </div>
                    </div>
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-3"></div>
                             <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label>DESCRIPTION</label>
                                    <input [formControlName]="mgc.PK_TYPE_DESC" [magic]="mgc.PK_TYPE_DESC"
                                        class="form-control-ed" mgFormat />
                                </div>
                            </div>
                           <div class="col-lg-3"></div>
                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.btnSave"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
