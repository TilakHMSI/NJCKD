    <!-- CRTY -->
    <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
        <input *ngIf="mg.isRowInRowEditing(row)"
               type="number"
               [formControlName]="mgc.PCR_DATA_PCR_CRTY"
               [magic]="mgc.PCR_DATA_PCR_CRTY"
               [rowId]="row.rowId"
               mgFormat />

        <label *ngIf="!mg.isRowInRowEditing(row)">
            {{ mg.getValue(mgc.PCR_DATA_PCR_CRTY, row.rowId) }}
        </label>

        <mgError [magic]="mgc.PCR_DATA_PCR_CRTY"
                 [rowId]="row.rowId"></mgError>
    </div>

    <!-- CRST -->
    <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
        <input *ngIf="mg.isRowInRowEditing(row)"
               [formControlName]="mgc.PCR_DATA_PCR_CRST"
               [magic]="mgc.PCR_DATA_PCR_CRST"
               [rowId]="row.rowId"
               mgFormat />

        <label *ngIf="!mg.isRowInRowEditing(row)"
               >
            {{ mg.getValue(mgc.PCR_DATA_PCR_CRST, row.rowId) }}
        </label>

        <mgError [magic]="mgc.PCR_DATA_PCR_CRST"
                 [rowId]="row.rowId"></mgError>
    </div>

</div>

</mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="5" [hidePageSize]="true" showFirstLastButtons
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
        
            <div class="row">
                <div class="col-lg-12 col-xxl-12">
                    <div class="form-group row">
                        <div *ngIf="mg.getVisible(mgc.V_Total_Cartons_in_PC_v1)==='visible'" class="col-lg-2">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >In PC</label>
                                <input type="number"  [formControlName]="mgc.V_Total_Cartons_in_PC_v1" [magic]="mgc.V_Total_Cartons_in_PC_v1"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
                        <div *ngIf="mg.getVisible(mgc.V_Total_Cartons_in_Lot_v1)==='visible'" class="col-lg-2">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >In Lot</label>
                                <input type="number" [formControlName]="mgc.V_Total_Cartons_in_Lot_v1" [magic]="mgc.V_Total_Cartons_in_Lot_v1"
                                    class="form-control-ed" mgFormat />
                                <mgError [magic]="mgc.V_Total_Cartons_in_Lot_v1"> </mgError>

                        </div>

                            </div>
                        </div>

                        </div>

                            </div>
                        </div>
                         <div class="col-lg-2" *ngIf="mg.getVisible(mgc.V_Packed_Cartons_in_Lot_v1)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >Packed</label>
                                <input type="number" [formControlName]="mgc.V_Packed_Cartons_in_Lot_v1" [magic]="mgc.V_Packed_Cartons_in_Lot_v1"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
                         <div class="col-lg-2" *ngIf="mg.getVisible(mgc.Edit23)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >UnPacked</label>
                                <input type="number" [formControlName]="mgc.Edit23" [magic]="mgc.Edit23"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
                         <div class="col-lg-2" *ngIf="mg.getVisible(mgc.V_Pack_Cartons_In_Container_v1)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >Packed</label>
                                <input type="number" [formControlName]="mgc.V_Pack_Cartons_In_Container_v1" [magic]="mgc.V_Pack_Cartons_In_Container_v1"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
                         <div class="col-lg-2" *ngIf="mg.getVisible(mgc.Edit27)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >UnPacked</label>
                                <input type="number" [formControlName]="mgc.Edit27" [magic]="mgc.Edit27"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
                         <div class="col-lg-2" *ngIf="mg.getVisible(mgc.V_Packed_Carton_in_Case_v1)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >Packed</label>
                                <input type="number" [formControlName]="mgc.V_Packed_Carton_in_Case_v1" [magic]="mgc.V_Packed_Carton_in_Case_v1"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>
 <div class="col-lg-2" *ngIf="mg.getVisible(mgc.Edit31)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >UnPacked</label>
                                <input type="number" [formControlName]="mgc.Edit31" [magic]="mgc.Edit31"
                                    class="form-control-ed" mgFormat />
                            </div>
                        </div>

                                Update
                            </button>
                        </div> -->
                    </div>
                </div>
            </div>
        

    </div>
</div>
