                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">

<div *ngIf="mg.ifRowCreated(row)"
     style="display: flex; flex-direction: column; gap: 8px;">

    <!-- LOT NO -->
    <div [formGroup]="mg.getFormGroupByRow(row.rowId)">

        <input *ngIf="mg.isRowInRowEditing(row)"
               type="number"
               [formControlName]="mgc.WRK_CROF_WRK_CROF_LTNO"
               [magic]="mgc.WRK_CROF_WRK_CROF_LTNO"
               [rowId]="row.rowId"
               mgFormat />

        <label *ngIf="!mg.isRowInRowEditing(row)">
            {{ mg.getValue(mgc.WRK_CROF_WRK_CROF_LTNO, row.rowId) }}
        </label>

        <mgError [magic]="mgc.WRK_CROF_WRK_CROF_LTNO"
                 [rowId]="row.rowId"></mgError>
   

        <input *ngIf="mg.isRowInRowEditing(row)"
               type="number"
               [formControlName]="mgc.Edit47"
               [magic]="mgc.Edit47"
               [rowId]="row.rowId"
               mgFormat />

        <label *ngIf="!mg.isRowInRowEditing(row)">
            {{ mg.getValue(mgc.Edit47, row.rowId) }}
        </label>

        <mgError [magic]="mgc.Edit47"
                 [rowId]="row.rowId"></mgError>
    </div>

    <!-- DATE -->
    <div [formGroup]="mg.getFormGroupByRow(row.rowId)">

        <input *ngIf="mg.isRowInRowEditing(row)"
               type="date"
               [formControlName]="mgc.PCR_DATA_PCR_CRPD"
               [magic]="mgc.PCR_DATA_PCR_CRPD"
               [rowId]="row.rowId" />

        <label *ngIf="!mg.isRowInRowEditing(row)">
            {{ mg.getValue(mgc.PCR_DATA_PCR_CRPD, row.rowId) | date:'dd/MM/yyyy' }}
        </label>
   

        <input *ngIf="mg.isRowInRowEditing(row)"
               type="time"
               [formControlName]="mgc.PCR_DATA_PCR_CRPT"
               [magic]="mgc.PCR_DATA_PCR_CRPT"
               [rowId]="row.rowId"
               step="1" />

        <label *ngIf="!mg.isRowInRowEditing(row)">
            {{ mg.getValue(mgc.PCR_DATA_PCR_CRPT, row.rowId) | magicTime: mgc.PCR_DATA_PCR_CRPT }}
        </label>
    </div>

</div>

</mat-cell>
