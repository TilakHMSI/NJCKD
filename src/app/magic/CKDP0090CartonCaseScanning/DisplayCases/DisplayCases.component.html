                                        <input type="date" [formControlName]="mgc.Edit26"
                                          [style.visibility]="mg.getVisible(mgc.Edit26, row.rowId)"
                                        [magic]="mgc.Edit26" [rowId]="row.rowId" dateInput />
                                    </div>
                                    <label class="font-size-h6" *ngIf="!mg.isRowInRowEditing(row)"
                                        [magic]="mgc.Edit26" [rowId]="row.rowId" [style.visibility]="mg.getVisible(mgc.Edit26, row.rowId)">
                                        
                                        {{ mg.getValue(mgc.Edit26, row.rowId) | date:'dd/MM/yyyy'
                                        }}
                                    </label>
                                </div>
                                       <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.Edit32"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.Edit32"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.Edit32 [rowId]="row.rowId"> </mgError>
                                        <label class="text-danger font-size-h6" *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.Edit32"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.Edit32, row.rowId)
                                            }}
                                        </label>
                                    
                                </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="8" [hidePageSize]="true" showFirstLastButtons
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
        
            <div class="row">
                <div class="col-lg-12 col-xxl-12">
                    <div class="form-group row">          
                        <div class="col-lg-3">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >Total Cases</label>
                                <input class="form-control-sm"  type="number" [formControlName]="mgc.V_Total_Cases_v1" type='number'
                                    [magic]="mgc.V_Total_Cases_v1" mgFormat />
                            </div>
                        </div>
                        <div class="col-lg-3" *ngIf="mg.getVisible(mgc.V_Packed_Cases_v1)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >Packed Cases</label>
                                <input type="number" [formControlName]="mgc.V_Packed_Cases_v1" [magic]="mgc.V_Packed_Cases_v1"
                                    class="form-control-sm" mgFormat />
                            </div>
                        </div>
                         <div class="col-lg-3" *ngIf="mg.getVisible(mgc.Edit12)==='visible'">
                            <div class="form-group-sm">
                                <label class="font-size-h6" >UnPacked Cases</label>
                                <input type="number" [formControlName]="mgc.Edit12" [magic]="mgc.Edit12"
                                    class="form-control-sm" mgFormat />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </div>
</div>
