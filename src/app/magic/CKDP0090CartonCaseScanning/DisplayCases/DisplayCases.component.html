

<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.DisplayCases">
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column15" [matColumnDef]="mgc.Column15">
                        <mat-header-cell *matHeaderCellDef>
                            Pc No/ Packing Approval
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
<div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                        <div>
                                            <div class="input-group" *ngIf="mg.isRowInRowEditing(row)">
                                                <input type="text" [formControlName]="mgc.WRK_CROF_PCNO"
                                                    *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.WRK_CROF_PCNO"
                                                    [rowId]="row.rowId" class="form-control-sm"
                                                    placeholder="SELECT PC NO" mgFormat />
                                                <div class="input-group-append">
                                                    <button type="button" class="btn btn-loanlist btn-icon-sm"
                                                        [magic]="mgc.WRK_CROF_PCNO" [rowId]="row.rowId">
                                                        <span class="svg-icon svg-icon-lg"><svg
                                                                xmlns="http://www.w3.org/2000/svg"
                                                                xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                                height="24px" viewBox="0 0 24 24" version="1.1">
                                                                <g stroke="none" stroke-width="1" fill="none"
                                                                    fill-rule="evenodd">
                                                                    <rect x="0" y="0" width="24" height="24" />
                                                                    <path
                                                                        d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                        fill="#000000" fill-rule="nonzero"
                                                                        opacity="0.3" />
                                                                    <path
                                                                        d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                        fill="#000000" opacity="0.3" />
                                                                </g>
                                                            </svg></span></button>
                                                </div>
                                            </div>

                                            <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.WRK_CROF_PCNO"
                                                [rowId]="row.rowId">
                                                {{mg.getValue(mgc.WRK_CROF_PCNO, row.rowId)
                                                }}
                                            </label>
                                         
                                        </div>
                                    </div> 

                                       <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.Edit27"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.Edit27" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.Edit27 [rowId]="row.rowId">
                                        </mgError>
                                        <label class="font-size-h6" *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.Edit27" [rowId]="row.rowId">
                                            {{mg.getValue(mgc.Edit27, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                                </div>
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="date" [formControlName]="mgc.PCS_DATA_PCS_APDT"
                                            [magic]="mgc.PCS_DATA_PCS_APDT" [rowId]="row.rowId" dateInput />
                                    </div>
                                    <label class="font-size-h6" *ngIf="!mg.isRowInRowEditing(row)"
                                        [magic]="mgc.PCS_DATA_PCS_APDT" [rowId]="row.rowId">
                                        {{ mg.getValue(mgc.PCS_DATA_PCS_APDT, row.rowId) | date:'dd/MM/yyyy'
                                        }}
                                    </label>
                                </div>
                                   <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div *ngIf="mg.isRowInRowEditing(row)" style="display: flex; flex-direction: row">
                                        <input type="time" [formControlName]="mgc.PCS_DATA_PCS_APTM"
                                            [magic]="mgc.PCS_DATA_PCS_APTM" [rowId]="row.rowId"
                                            [style.visibility]="mg.getVisible(mgc.PCS_DATA_PCS_APTM, row.rowId)" step=1 />
                                    </div>

                                        [rowId]="row.rowId"

                                        {{mg.getValue(mgc.PCS_DATA_PCS_APTM, row.rowId)
                                        | magicTime : mgc.PCS_DATA_PCS_APTM}}
                                    </label>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>

                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"

            <div class="row">

                        <div class="col-lg-3" *ngIf="mg.getVisible(mgc.V_Packed_Cases_v1)==='visible'">
