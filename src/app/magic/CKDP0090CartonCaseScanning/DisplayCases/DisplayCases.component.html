                            magicMark="magicTableRowContainer"

                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input
                                            style="width: 70%"
                                            [formControlName]="mgc.WRK_CROF_PCNO"
                                            *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.WRK_CROF_PCNO"
                                            [rowId]="row.rowId"
                                            [mask]="mg.getAlphaMask(mgc.WRK_CROF_PCNO)"
                                            [showMaskTyped]='true'
                                        />
                                        <mgError
                                            [magic]=mgc.WRK_CROF_PCNO
                                            [rowId]="row.rowId"
                                        > </mgError>
                                        <label
                                            *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.WRK_CROF_PCNO"
                                            [rowId]="row.rowId"
                                        >
                                            {{mg.getValue(mgc.WRK_CROF_PCNO, row.rowId)
}}
                                        </label>
                                        <button
                                            style="min-width: auto; margin: auto"
                                            [magic]="mgc.WRK_CROF_PCNO"
                                            [rowId]="row.rowId"
                                        >...</button>
                                    </div>
                                </div>
                            </div>
                            <div
                                style="display: flex; flex-direction: row"
                                *ngIf="mg.ifRowCreated(row)"
                            >
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <label

}}

                [magic]="mgc.Label5"
                class="lable_overflow"
            >
                Packing Off
            </label>
            <label
                [magic]="mgc.Label6"
                class="lable_overflow"
            >
                Gross Weight
            </label>
        </div>
        <div style="display: flex; flex-direction: row">
            <label
                [magic]="mgc.Label7"
                [style.visibility]="mg.getVisible(mgc.Label7)"
                class="lable_overflow"
            >
                Total Cases
            </label>
            <div>
                <input
                    [formControlName]="mgc.V_Total_Cases_v1"
                    type='number'
                    [magic]="mgc.V_Total_Cases_v1"
                    [style.visibility]="mg.getVisible(mgc.V_Total_Cases_v1)"
                    mgFormat
                />
                <mgError [magic]=mgc.V_Total_Cases_v1> </mgError>
            </div>
            <label
                [magic]="mgc.Label9"
                [style.visibility]="mg.getVisible(mgc.Label9)"
                class="lable_overflow"
            >
                Packed
            </label>
            <div>
                <input
                    [formControlName]="mgc.V_Packed_Cases_v1"
                    type='number'
                    [magic]="mgc.V_Packed_Cases_v1"
                    [style.visibility]="mg.getVisible(mgc.V_Packed_Cases_v1)"
                    mgFormat
                />
                <mgError [magic]=mgc.V_Packed_Cases_v1> </mgError>
            </div>
            <label
                [magic]="mgc.Label11"
                [style.visibility]="mg.getVisible(mgc.Label11)"
                class="lable_overflow"
            >
                UnPacked
            </label>
            <label
                [magic]="mgc.Edit12"
                [style.visibility]="mg.getVisible(mgc.Edit12)"
            >
                {{mg.getValue(mgc.Edit12) }}
            </label>
            <label
                [magic]="mgc.Label13"
                [style.visibility]="mg.getVisible(mgc.Label13)"
                class="lable_overflow"
            >
                (Ctrl + I --> SKID List)
            </label>
        </div>
    </div>
</div>
