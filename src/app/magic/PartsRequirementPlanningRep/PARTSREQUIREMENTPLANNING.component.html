<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.PARTSREQUIREMENTPLANNING">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                           {{mg.getValue(mgc.Edit2) }}
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            
                            <div class="col-lg-12">
                               <div class="form-group-sm">
                                    <label>Month</label>
                                    <input class="form-control-ed" type="date" [formControlName]="mgc.Date_From_v" [magic]="mgc.Date_From_v" dateInput />
                                </div>
                            </div>
                            <div class="col-lg-12">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.Ok_Button"
                                        class="btn btn-primary font-weight-bold mt-8 btn-wdth">
                                        View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
