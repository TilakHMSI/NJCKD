                </div>

                                        <mgError [magic]=mgc.WRK_PKLS_SLFL [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.WRK_PKLS_SLFL"

                                            {{mg.getValue(mgc.WRK_PKLS_SLFL, row.rowId)

                                    </div>
                                </div>
                            </div>
