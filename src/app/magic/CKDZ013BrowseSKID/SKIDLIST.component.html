
<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.SKIDLIST">
	  <div class="card">
             <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                         SKID LIST
                        </label></h3>
                         <label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit1)}}
                        </label>
                    <div class="d-flex align-items-center">

                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div> 
             </div>
                </div>
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table1TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column3" [matColumnDef]="mgc.Column3">
                        <mat-header-cell *matHeaderCellDef>
                           SKID No.
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SKD_MAST_SKID_CONTROL_NO" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.SKD_MAST_SKID_CONTROL_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SKD_MAST_SKID_CONTROL_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SKD_MAST_SKID_CONTROL_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SKD_MAST_SKID_CONTROL_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column4" [matColumnDef]="mgc.Column4">
                        <mat-header-cell *matHeaderCellDef>
                            Pc No
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SKD_MAST_SKID_PC_NO"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.SKD_MAST_SKID_PC_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SKD_MAST_SKID_PC_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SKD_MAST_SKID_PC_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SKD_MAST_SKID_PC_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column5" [matColumnDef]="mgc.Column5">
                        <mat-header-cell *matHeaderCellDef>
                           Lot No
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SKD_MAST_SKID_LOT_NO"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.SKD_MAST_SKID_LOT_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SKD_MAST_SKID_LOT_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SKD_MAST_SKID_LOT_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SKD_MAST_SKID_LOT_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div> 
                            </div>
                        </mat-cell>
                    </ng-container>
                            <ng-container [magic]="mgc.Column6" [matColumnDef]="mgc.Column6">
                        <mat-header-cell *matHeaderCellDef>
                           Container
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SKD_MAST_SKID_CONTAINER_NO"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.SKD_MAST_SKID_CONTAINER_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SKD_MAST_SKID_CONTAINER_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SKD_MAST_SKID_CONTAINER_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SKD_MAST_SKID_CONTAINER_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                      <ng-container [magic]="mgc.Column7" [matColumnDef]="mgc.Column7">
                        <mat-header-cell *matHeaderCellDef>
                           Case
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SKD_MAST_SKID_CASE_NO"
                                            *ngIf="mg.isRowInRowEditing(row)" type='number'
                                            [magic]="mgc.SKD_MAST_SKID_CASE_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SKD_MAST_SKID_CASE_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SKD_MAST_SKID_CASE_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SKD_MAST_SKID_CASE_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                  
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>

                     
   
</div>
</div>
