

<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.CKDR0010PMRequiredRepor2">
        <div class="card">
            <div class="card-header">
                         <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit2)}}
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit5)}}
                        </label>
                        <label [magic]="mgc.Edit3" class="mb-0 mr-3">
                            {{mg.getValue(mgc.Edit3)
                            | magicDate : mgc.Edit3}}
                        </label>
                        <label [magic]="mgc.Edit4" class="mb-0 mr-1">
                            {{mg.getValue(mgc.Edit4)
                            | magicTime : mgc.Edit4}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        <div class="form-group row">
                           
							   <div class="col-lg-6">
                                <div class="form-group-sm">
                                   
                                    <label >Date From</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Date_From_v"
                            [magic]="mgc.Date_From_v" dateInput />
                                  
                                </div>
                            </div>		
                               <div class="col-lg-6">
                                <div class="form-group-sm">
                                   
                                    <label >Date To</label>
                                <input class="form-control-ed" type="date" [formControlName]="mgc.Date_To_v"
                            [magic]="mgc.Date_To_v" dateInput />
                                  
                                </div>
                            </div>	
                            			
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="col-lg-12">
            <magic-subform [magic]="mgc.CartonTypes">
            </magic-subform>
        </div>
    </div>
</div>
