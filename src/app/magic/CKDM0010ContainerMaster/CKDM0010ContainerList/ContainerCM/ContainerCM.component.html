<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.ContainerCM">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            Container : CM
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label>Container Code</label>
                                    <input [formControlName]="mgc.CNT_CODE" [magic]="mgc.CNT_CODE"
                                        class="form-control-ed" mgFormat />
                                    <mgError [magic]="mgc.CNT_CODE"> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="form-group-sm">
                                    <label>Description</label>
                                    <input [formControlName]="mgc.CNT_DESC" [magic]="mgc.CNT_DESC"
                                        class="form-control-ed" mgFormat />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-3">
                                <div class="form-group-sm">
                                    <label>Length </label>
                                    <input class="form-control-ed" [formControlName]="mgc.CNT_LENG" type='number' [magic]="mgc.CNT_LENG"
                                        mgFormat />
                                    <mgError [magic]=mgc.CNT_LENG> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-3">
                                <div class="form-group-sm">
                                    <label>Height </label>
                                    <input class="form-control-ed" [formControlName]="mgc.CNT_HEIG" type='number' [magic]="mgc.CNT_HEIG"
                                        mgFormat />
                                    <mgError [magic]=mgc.CNT_HEIG> </mgError>
                                </div>
                            </div>
                             <div class="col-lg-3">
                                <div class="form-group-sm">
                                    <label>Width </label>
                                    <input class="form-control-ed" [formControlName]="mgc.CNT_WIDT" type='number' [magic]="mgc.CNT_WIDT"
                                        mgFormat />
                                    <mgError [magic]=mgc.CNT_WIDT> </mgError>
                                </div>
                            </div>
                             <div class="col-lg-3">
                                <div class="form-group-sm">
                                    <label>Weight </label>
                                    <input class="form-control-ed" [formControlName]="mgc.CNT_WEIG" type='number' [magic]="mgc.CNT_WEIG"
                                        mgFormat />
                                    <mgError [magic]=mgc.CNT_WEIG> </mgError>
                                </div>
                            </div>
                             <label [magic]="mgc.Label22" class="text-danger mb-5"  >
                        {{mg.getText(mgc.Label22)}}
                    </label>
                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">

       <div class="form-group row">
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.btnSave"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>
                             <div class="col-lg-4">
                                <div class="form-group-sm">
                                </div>
                            </div>



                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
