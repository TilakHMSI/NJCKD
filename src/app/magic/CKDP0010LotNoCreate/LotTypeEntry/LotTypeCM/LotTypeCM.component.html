<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.LotTypeCM">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            LOT Number Create
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-4">
                                <div class="form-group">
                                    <label>LOT ID</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.KDPM_LOT_ID" [magic]="mgc.KDPM_LOT_ID"
                                            class="form-control" placeholder="SELECT LOT CODE" mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.KDPM_LOT_ID">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label>MODEL CODE</label>
                                    <input class="form-control-ed" [formControlName]="mgc.KDPCMODLOT_KDPM_MODEL"
                                        [magic]="mgc.KDPCMODLOT_KDPM_MODEL" mgFormat />
                                    <mgError [magic]=mgc.KDPCMODLOT_KDPM_MODEL> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label>MODEL DESCRIPTION</label>
                                    <input class="form-control-ed" [formControlName]="mgc.MTOCMST_MTMDN1"
                                        [magic]="mgc.MTOCMST_MTMDN1" mgFormat />
                                    <mgError [magic]=mgc.MTOCMST_MTMDN1> </mgError>
                                </div>
                            </div>

                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label>MODEL TYPE</label>
                                    <input class="form-control-ed" [formControlName]="mgc.KDPCMODLOT_KDPM_TYPE"
                                        [magic]="mgc.KDPCMODLOT_KDPM_TYPE" mgFormat />
                                    <mgError [magic]=mgc.KDPCMODLOT_KDPM_TYPE> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label>OPTION</label>
                                    <input class="form-control-ed" [formControlName]="mgc.KDPCMODLOT_KDPM_OPT"
                                        [magic]="mgc.KDPCMODLOT_KDPM_OPT" mgFormat />
                                    <mgError [magic]=mgc.KDPCMODLOT_KDPM_OPT> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label> QUANTITY</label>
                                    <input class="form-control-ed" [formControlName]="mgc.KDPCMODLOT_KDPM_QTY"
                                        type='number' [magic]="mgc.KDPCMODLOT_KDPM_QTY" mgFormat />
                                    <label class="text-secondary" [magic]="mgc.LOT_MQTY">
                                        {{mg.getValue(mgc.LOT_MQTY) }}
                                    </label>
                                    <mgError [magic]=mgc.KDPCMODLOT_KDPM_QTY> </mgError>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.btnSave"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        SAVE
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
