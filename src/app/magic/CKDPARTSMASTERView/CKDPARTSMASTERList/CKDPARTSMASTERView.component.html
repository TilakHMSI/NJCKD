<div novalidate [formGroup]="screenFormGroup">
    <div [magic]="mgc.CKDPARTSMASTERView">
        <div
            class="container-fluid d-flex align-items-center justify-content-sm-between justify-content-center flex-wrap flex-sm-nowrap">
            <div class="d-flex align-items-center flex-wrap mb-2">
                <div class="d-flex align-items-center ser-bt1">
                    <div></div><button type="button" class="btn btn-sm btn-success ml-5" [magic]="mgc.btnAdd"
                        *ngIf="mg.getVisible(mgc.btnAdd)==='visible'">
                        <i class="flaticon-app mr-2"></i>Add
                    </button>
                </div>
            </div>
        </div>
        <div class="m-tablewrapper pl-0 pr-0">
            <div class="example-container mat-elevation-z8 Table9TableContainerProps">
                <mat-table #table [dataSource]="dataSource" class="container_border" matSort matSortDisableClear
                    (matSortChange)="tableService.sortData($event)">
                    <ng-container [magic]="mgc.Column10" [matColumnDef]="mgc.Column10">
                        <mat-header-cell *matHeaderCellDef>
                            PART NO.
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PART_NO" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PART_NO" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PART_NO [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PART_NO"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PART_NO, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column11" [matColumnDef]="mgc.Column11">
                        <mat-header-cell *matHeaderCellDef>
                            WEIGHT
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PRT_WGT" *ngIf="mg.isRowInRowEditing(row)"
                                            currencyMask [options]="mg.getNumericPicture(mg.getPicture(mgc.PRT_WGT))"
                                            [magic]="mgc.PRT_WGT" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PRT_WGT [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PRT_WGT"
                                            [rowId]="row.rowId">
                                            {{mg.getFormattedValue(mgc.PRT_WGT, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column12" [matColumnDef]="mgc.Column12">
                        <mat-header-cell *matHeaderCellDef>
                            HARDWARE PART (Y/N)
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <input type="checkbox" id="HW_YN_{{row.rowId}}" [formControlName]="mgc.HW_YN"
                                        [magic]="mgc.HW_YN" [rowId]="row.rowId" />
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column13" [matColumnDef]="mgc.Column13">
                        <mat-header-cell *matHeaderCellDef>
                            PACKING MATERIAL TYPE
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PK_TYPE_MAST_PK_TYPE_DESC"
                                            *ngIf="mg.isRowInRowEditing(row)" [magic]="mgc.PK_TYPE_MAST_PK_TYPE_DESC"
                                            [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PK_TYPE_MAST_PK_TYPE_DESC [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PK_TYPE_MAST_PK_TYPE_DESC" [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PK_TYPE_MAST_PK_TYPE_DESC, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column14" [matColumnDef]="mgc.Column14">
                        <mat-header-cell *matHeaderCellDef>
                            PACKING MATERIAL DESCRIPTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PK_MAST_DESC" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PK_MAST_DESC" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PK_MAST_DESC [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PK_MAST_DESC"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PK_MAST_DESC, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column24" [matColumnDef]="mgc.Column24">
                        <mat-header-cell *matHeaderCellDef>
                            PART NAME
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.PT_NAM" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.PT_NAM" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.PT_NAM [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.PT_NAM"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.PT_NAM, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column25" [matColumnDef]="mgc.Column25">
                        <mat-header-cell *matHeaderCellDef>
                            SECTION DESCRIPTION
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <div [formGroup]="mg.getFormGroupByRow(row.rowId)">
                                    <div>
                                        <input [formControlName]="mgc.SEC_DESC" *ngIf="mg.isRowInRowEditing(row)"
                                            [magic]="mgc.SEC_DESC" [rowId]="row.rowId" mgFormat />
                                        <mgError [magic]=mgc.SEC_DESC [rowId]="row.rowId"> </mgError>
                                        <label *ngIf="!mg.isRowInRowEditing(row)" [magic]="mgc.SEC_DESC"
                                            [rowId]="row.rowId">
                                            {{mg.getValue(mgc.SEC_DESC, row.rowId)
                                            }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <ng-container [magic]="mgc.Column26" [matColumnDef]="mgc.Column26">
                        <mat-header-cell *matHeaderCellDef>
                            Action
                        </mat-header-cell>
                        <mat-cell *matCellDef="let row" magicMark="magicTableRowContainer">
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" [magic]="mgc.btnEdit" [rowId]="row.rowId">
                                    <i class="icon-xl far fa-edit text-info" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div style="display: flex; flex-direction: row" *ngIf="mg.ifRowCreated(row)">
                                <button class="btn-tbl" [magic]="mgc.btnDelete" [rowId]="row.rowId">
                                    <i class="icon-xl fas fa-trash text-danger" aria-hidden="true"></i>
                                </button>
                            </div>
                        </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                    <mat-row *matRowDef="let row; columns: displayedColumns;" class="table_row"
                        [ngClass]="{ 'selected': selection.isSelected(row)}" [magicRow]="row?.rowId"
                        (click)="row? tableService.selectRow(row.rowId) : null">
                    </mat-row>
                </mat-table>
                <mat-paginator #paginator [pageSize]="10" [hidePageSize]="true"
                    (page)="tableService.mgOnPaginateChange($event)">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
