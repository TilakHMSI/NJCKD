
<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.StockTransferMain">
        <div class="card">
            <div class="card-header">
                         <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                           Stock Tarnsfer Main
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <label class="lable_overflow mb-0">
                            {{mg.getText(mgc.Edit2)}}
                        </label>
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12">
                        <div class="form-group row">
                           
                              <div class="col-lg-4">
                                <div class="form-group-sm">
                                    <label class="lbl-sm">Challan Date</label>
                                    <input type="date" [formControlName]="mgc.v_ChallanDate" [magic]="mgc.v_ChallanDate"
                                        class="form-control-ed" *ngIf="mg.getVisible(mgc.v_ChallanDate)==='visible'"
                                        dateInput />
                                </div>
                            </div>
                            <div class="col-lg-4">
    <div class="form-group-sm">
        <label class="lbl-sm">Challan Time</label>
        <input type="time"
               [formControlName]="mgc.V_v_ChallanTime"
               [magic]="mgc.V_v_ChallanTime"
               class="form-control-ed"
               *ngIf="mg.getVisible(mgc.V_v_ChallanTime)==='visible'" />
    </div>
</div>
							 <div class="col-lg-4">
                                <div class="form-group-sm">         
                                <label>Stock Transfer To </label>
                                <input type="text" [formControlName]="mgc.V_v_TransferTo" [magic]="mgc.V_v_TransferTo"
                                    class="form-control" mgFormat />
                                </div>
                            </div>
                            
							 <div class="col-lg-4">
                                <div class="form-group-sm">             
                                <label> Tarnsfer Mode</label>
                                <input type="text" [formControlName]="mgc.v_Mode" [magic]="mgc.v_Mode"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                                   <div class="col-lg-4">
                                <div class="form-group">
                                    <label>Transporter</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.v_Transport"
                                            [magic]="mgc.v_Transport" class="form-control"
                                            placeholder="SELECT LOT " mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.v_Transport">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            	 <div class="col-lg-2">
                                <div class="form-group-sm">         
                                <label>.</label>
                                <input type="number" [formControlName]="mgc.TransporterMaster_TRNS_NM" [magic]="mgc.TransporterMaster_TRNS_NM"
                                    class="form-control" mgFormat />
                                </div>
                            </div>
                            	 <div class="col-lg-2">
                                <div class="form-group-sm">             
                                <label> Truck No</label>
                                <input type="text" [formControlName]="mgc.v_TruckRef" [magic]="mgc.v_TruckRef"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                            	 <div class="col-lg-2">
                                <div class="form-group-sm">             
                                <label> GR No</label>
                                <input type="text" [formControlName]="mgc.v_GRNO" [magic]="mgc.v_GRNO"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                            	 <div class="col-lg-2">
                                <div class="form-group-sm">             
                                <label> Responsible Person</label>
                                <input type="text" [formControlName]="mgc.v_ResponsiblePerson" [magic]="mgc.v_ResponsiblePerson"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                            	 <div class="col-lg-2">
                                <div class="form-group-sm">             
                                <label> Responsible Dept</label>
                                <input type="text" [formControlName]="mgc.v_ResponsibleDept" [magic]="mgc.v_ResponsibleDept"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                             <div class="col-lg-2">
                                <div class="form-group-sm">             
                                <label>Remark</label>
                                <input type="text" [formControlName]="mgc.v_Remark" [magic]="mgc.v_Remark"
                                    class="form-control" mgFormat />
                            
                                    
                                </div>
                            </div>
                        

                                 <div class="col-lg-4">
                                <div class="form-group">
                                    <label>PC No</label>
                                    <div class="input-group">
                                        <input type="text" [formControlName]="mgc.v_P_C_No"
                                            [magic]="mgc.v_P_C_No" class="form-control"
                                            placeholder="SELECT Carton " mgFormat />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-loanlist btn-icon"
                                                [magic]="mgc.v_P_C_No">
                                                <span class="svg-icon svg-icon-lg"><svg
                                                        xmlns="http://www.w3.org/2000/svg"
                                                        xmlns:xlink="http://www.w3.org/1999/xlink" width="24px"
                                                        height="24px" viewBox="0 0 24 24" version="1.1">
                                                        <g stroke="none" stroke-width="1" fill="none"
                                                            fill-rule="evenodd">
                                                            <rect x="0" y="0" width="24" height="24" />
                                                            <path
                                                                d="M3,12 C3,12 5.45454545,6 12,6 C16.9090909,6 21,12 21,12 C21,12 16.9090909,18 12,18 C5.45454545,18 3,12 3,12 Z"
                                                                fill="#000000" fill-rule="nonzero" opacity="0.3" />
                                                            <path
                                                                d="M12,15 C10.3431458,15 9,13.6568542 9,12 C9,10.3431458 10.3431458,9 12,9 C13.6568542,9 15,10.3431458 15,12 C15,13.6568542 13.6568542,15 12,15 Z"
                                                                fill="#000000" opacity="0.3" />
                                                        </g>
                                                    </svg></span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            	 <div class="col-lg-4">
                                <div class="form-group-sm">         
                                <label>Lot ID</label>
                                <input type="number" [formControlName]="mgc.v_LotID" [magic]="mgc.v_LotID"
                                    class="form-control" mgFormat />
                                </div>
                            </div>				
                        </div>
                    </div>

                </div>
            </div>
        </div>
         <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.Proceed"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        Proceed
                                    </button>
                                </div>
                            </div>
                               <div class="col-lg-12 text-center">
                                <div class="form-group d-flex justify-content-center">
                                    <button type="button" [magic]="mgc.Exit"
                                        class="btn btn-primary font-weight-bold mr-3 btn-wdth">
                                        Exit
                                    </button>
                                </div>
                            </div>

                        </div>

                    </div>
    </div>
</div>
