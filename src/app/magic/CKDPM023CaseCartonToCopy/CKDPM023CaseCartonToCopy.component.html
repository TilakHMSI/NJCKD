

<div novalidate [formGroup]="screenFormGroup">
    <div class="container-fluid-ov" [magic]="mgc.CKDPM023CaseCartonToCopy">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h3><label class="lable_overflow mb-0">
                            Case Carton To Copy
                        </label></h3>
                    <div class="d-flex align-items-center">
                        <button type="button" [magic]="mgc.btnexit"
                            class="btn btn-danger btn-sm font-weight-bold ml-2">Back</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="form-group row" style="margin: 0rem;">
                    <div class="col-lg-12 col-xxl-12">
                        <div class="form-group row">
                            <div class="col-lg-12">
                                <div class="form-group-sm">
                                    <label>{{mg.getValue(mgc.Edit1) }}</label>
                                    <input class="form-control" [formControlName]="mgc.Case__Carton_No_v"
                                        [magic]="mgc.Case__Carton_No_v" mgFormat />
                                    <mgError [magic]=mgc.Case__Carton_No_v> </mgError>
                                </div>
                            </div>
                            <div class="col-lg-12">
                                <div class="form-group-sm">
                                    <button type="button" [magic]="mgc.OK_Button_v"
                                        class="btn btn-primary font-weight-bold mt-10 btn-wdth">
                                        OK
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
